# =============================================================================
# AI Contract Testing - Provider Thin Caller
# =============================================================================
#
# Triggers:
#   - Label 'contract-testing' added to PR → Verify contracts
#   - Push to main → Verify contracts
#   - Pactflow webhook (pact_changed) → Verify contracts
#
# =============================================================================

name: AI Contract Testing

on:
  pull_request:
    types: [labeled]
  
  push:
    branches: [main]
  
  repository_dispatch:
    types: [pact_changed]

jobs:
  # ===========================================================================
  # Trigger: Label 'contract-testing' added to PR
  # ===========================================================================
  verify-on-label:
    if: |
      github.event_name == 'pull_request' && 
      github.event.action == 'labeled' && 
      github.event.label.name == 'contract-testing'
    
    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      provider_name: ProviderService
    secrets: inherit

  # ===========================================================================
  # Trigger: Push to main
  # ===========================================================================
  verify-on-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: 0
      provider_name: ProviderService
    secrets: inherit

  # ===========================================================================
  # Trigger: Pactflow webhook (consumer published new pact)
  # ===========================================================================
  verify-on-webhook:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'pact_changed'
    
    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: 0
      provider_name: ProviderService
      pact_url: ${{ github.event.client_payload.pact_url }}
    secrets: inherit