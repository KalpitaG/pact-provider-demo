# =============================================================================
# AI Contract Testing - Provider Thin Caller
# =============================================================================
#
# Triggers:
#   - Label 'contract-testing' added to PR → Verify contracts
#   - Push to main → Verify contracts
#   - Pactflow webhook (contract_requiring_verification_published) → Verify contracts
#   - Comment 'ai-revise: <feedback>' on handler PR → Revise handlers
#
# provider_name resolution:
#   - Webhook: use Pactflow's authoritative provider_name from the payload
#   - Label/push: leave empty → central workflow reads .contract-testing.yml
#
# =============================================================================

name: AI Contract Testing

on:
  pull_request:
    types: [labeled]

  push:
    branches: [main]

  repository_dispatch:
    types: [contract_requiring_verification_published]

  issue_comment:
    types: [created]

jobs:
  # ===========================================================================
  # Trigger: Label 'contract-testing' added to PR
  # ===========================================================================
  verify-on-label:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'contract-testing'

    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      provider_name: ''
    secrets: inherit

  # ===========================================================================
  # Trigger: Push to main
  # ===========================================================================
  verify-on-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: 0
      provider_name: ''
    secrets: inherit

  # ===========================================================================
  # Trigger: Pactflow webhook (consumer published new pact)
  # ===========================================================================
  verify-on-webhook:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'contract_requiring_verification_published'

    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-verification.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: 0
      provider_name: ${{ github.event.client_payload.provider_name }}
      pact_url: ${{ github.event.client_payload.pact_url }}
    secrets: inherit

  # ===========================================================================
  # Trigger: Developer comments 'ai-revise: <feedback>' on handler PR
  # ===========================================================================
  revise-on-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, 'ai-revise:')

    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/provider-revision.yml@main
    with:
      repository: ${{ github.repository }}
      handler_pr_number: ${{ github.event.issue.number }}
      comment_body: ${{ github.event.comment.body }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  # ===========================================================================
  # Deployment Safety: can-i-deploy + record-deployment (push to main only)
  # ===========================================================================
  can-i-deploy:
    name: Can I Deploy?
    needs: [verify-on-push]
    if: always() && needs.verify-on-push.result == 'success' && needs.verify-on-push.outputs.verification_passed == 'true'
    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/can-i-deploy.yml@main
    with:
      pacticipant: pact-provider-demo
      version: ${{ github.sha }}
      environment: production
    secrets: inherit

  record-deployment:
    name: Record Deployment
    needs: [can-i-deploy]
    if: needs.can-i-deploy.outputs.can_deploy == 'true'
    uses: KalpitaG/ai-contract-testing-demo/.github/workflows/record-deployment.yml@main
    with:
      pacticipant: pact-provider-demo
      version: ${{ github.sha }}
      environment: production
    secrets: inherit
